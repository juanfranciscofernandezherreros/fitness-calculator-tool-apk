<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Fitness Tools Logo">
  <defs>
    <!-- Outer circle gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <!-- Inner glow -->
    <radialGradient id="glowGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0" />
    </radialGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="rgba(102,62,162,0.45)" />
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="url(#bgGrad)" filter="url(#shadow)" />
  <circle cx="60" cy="60" r="58" fill="url(#glowGrad)" />

  <!-- ── Dumbbell ── -->
  <!-- left weight plate outer -->
  <rect x="10" y="52" width="14" height="16" rx="4" fill="#fff" opacity="0.95"/>
  <!-- left weight plate inner -->
  <rect x="13" y="55" width="8" height="10" rx="2" fill="url(#bgGrad)" opacity="0.6"/>
  <!-- right weight plate outer -->
  <rect x="96" y="52" width="14" height="16" rx="4" fill="#fff" opacity="0.95"/>
  <!-- right weight plate inner -->
  <rect x="99" y="55" width="8" height="10" rx="2" fill="url(#bgGrad)" opacity="0.6"/>
  <!-- bar -->
  <rect x="24" y="57" width="72" height="6" rx="3" fill="#fff" opacity="0.95"/>

  <!-- ── Human silhouette (top half, stylised) ── -->
  <!-- head -->
  <circle cx="60" cy="29" r="7" fill="#fff" opacity="0.95"/>
  <!-- torso -->
  <path d="M50,37 Q50,28 60,28 Q70,28 70,37 L67,52 Q60,55 53,52 Z" fill="#fff" opacity="0.9"/>
  <!-- arms suggestion -->
  <line x1="50" y1="40" x2="38" y2="48" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
  <line x1="70" y1="40" x2="82" y2="48" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.85"/>

  <!-- ── Small calculator icon (bottom centre) ── -->
  <rect x="48" y="78" width="24" height="20" rx="3" fill="#fff" opacity="0.92"/>
  <!-- calculator screen -->
  <rect x="51" y="80.5" width="18" height="6" rx="1.5" fill="url(#bgGrad)" opacity="0.8"/>
  <!-- calculator buttons (3×2 grid) -->
  <rect x="51" y="89" width="4" height="3" rx="1" fill="url(#bgGrad)" opacity="0.7"/>
  <rect x="56" y="89" width="4" height="3" rx="1" fill="url(#bgGrad)" opacity="0.7"/>
  <rect x="61" y="89" width="4" height="3" rx="1" fill="#e74c3c" opacity="0.85"/>
  <rect x="51" y="93.5" width="4" height="3" rx="1" fill="url(#bgGrad)" opacity="0.7"/>
  <rect x="56" y="93.5" width="4" height="3" rx="1" fill="url(#bgGrad)" opacity="0.7"/>
  <rect x="61" y="93.5" width="4" height="3" rx="1" fill="url(#bgGrad)" opacity="0.7"/>

  <!-- ── Pulse / heartbeat line ── -->
  <polyline points="15,113 28,113 33,104 38,122 43,108 48,113 72,113 77,104 82,122 87,108 92,113 105,113"
            fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>
</svg>
