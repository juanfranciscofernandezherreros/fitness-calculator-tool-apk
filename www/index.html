<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>🎯 Ruta de Aprendizaje - Grammar & Vocabulary</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .logout-btn {
      position: absolute;
      top: 1.2rem;
      right: 1.2rem;
    }
    header {
      position: relative;
    }
    body { visibility: hidden; }
  </style>
</head>
<body>
  <header>
    <h1>🎯 Ruta de Aprendizaje</h1>
    <p>Avanza paso a paso por Gramática y Vocabulario</p>
    <button class="btn secondary logout-btn" id="logout-btn">Cerrar sesión</button>
  </header>

  <main>
    <section id="progress-section">
      <p id="progress-text">Progreso: 0%</p>
      <div id="progress-bar">
        <div id="progress-fill"></div>
      </div>
      <button id="reset" class="btn secondary">Reiniciar progreso</button>
    </section>

    <h2>🧩 Grammar Path</h2>

    <ul class="units" id="learning-path">
      <!-- UNIT 1 -->
      <li data-unit="1" class="unit-block">
        <details open>
          <summary>
            <span class="chip">Unit 1:</span> <strong>Present Tenses</strong>
          </summary>
          <ul class="sublist">
            <li data-sub="1.1">
              <span>→ Present Simple</span>
              <button class="btn start" data-link="grammar/present-simple.html">Start</button>
            </li>
            <li data-sub="1.2">
              <span>→ Present Continuous</span>
              <button class="btn start" data-link="grammar/present-continuous.html">Start</button>
            </li>
          </ul>
        </details>
      </li>

      <!-- UNIT 2 -->
      <li data-unit="2" class="unit-block locked">
        <details>
          <summary>
            <span class="chip">Unit 2:</span> <strong>Past Tenses</strong>
          </summary>
          <ul class="sublist">
            <li data-sub="2.1">
              <span>→ Past Simple</span>
              <button class="btn start" data-link="grammar/past-simple.html" disabled>Locked</button>
            </li>
            <li data-sub="2.2">
              <span>→ Past Continuous</span>
              <button class="btn start" data-link="grammar/past-continuous.html" disabled>Locked</button>
            </li>
          </ul>
        </details>
      </li>

      <!-- Puedes añadir más unidades aquí -->
    </ul>
  </main>

  <footer>
    <p>© 2025 Ruta educativa - Inglés Grammar & Vocabulary</p>
  </footer>

  <script src="auth.js"></script>
  <script>
    if (!isAuthenticated()) {
      window.location.href = 'login.html';
    } else {
      document.body.style.visibility = 'visible';
    }
    document.getElementById('logout-btn').addEventListener('click', logout);
  </script>
  <script src="game.js"></script>
</body>
</html>
