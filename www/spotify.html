<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#121212" />
  <title>GrammarFlow</title>
  <link rel="stylesheet" href="spotify.css" />
</head>
<body>

  <!-- ── Status bar ────────────────────────────────────── -->
  <div class="status-bar">
    <span class="clock">10:00</span>
    <div class="status-icons">
      <!-- Signal bars -->
      <svg viewBox="0 0 24 24">
        <rect x="2"  y="16" width="3" height="5" rx="1"/>
        <rect x="7"  y="11" width="3" height="10" rx="1"/>
        <rect x="12" y="7"  width="3" height="14" rx="1"/>
        <rect x="17" y="3"  width="3" height="18" rx="1"/>
      </svg>
      <!-- Battery -->
      <svg viewBox="0 0 24 24">
        <rect x="2" y="7" width="17" height="10" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <path d="M21 10v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <rect x="4" y="9" width="12" height="6" rx="1"/>
      </svg>
    </div>
  </div>

  <!-- ── App shell ──────────────────────────────────────── -->
  <div id="app">

    <!-- HOME ──────────────────────────────────────────── -->
    <div class="screen active" id="screen-home"></div>

    <!-- SEARCH ────────────────────────────────────────── -->
    <div class="screen" id="screen-search"></div>

    <!-- LIBRARY ───────────────────────────────────────── -->
    <div class="screen" id="screen-library"></div>

  </div>

  <!-- ── Mini player ───────────────────────────────────── -->
  <div class="mini-player" id="mini-player">
    <div class="mini-art" id="mini-art">📚</div>
    <div class="mini-info">
      <div class="mini-title" id="mini-title">Choose a lesson</div>
      <div class="mini-sub"  id="mini-sub">GrammarFlow</div>
    </div>
    <div class="mini-actions">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </div>
    <div class="mini-progress" id="mini-progress"></div>
  </div>

  <!-- ── Bottom navigation ─────────────────────────────── -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="home" onclick="showTab('home')">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      Home
    </button>
    <button class="nav-btn" data-tab="search" onclick="showTab('search')">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      Search
    </button>
    <button class="nav-btn" data-tab="library" onclick="showTab('library')">
      <svg viewBox="0 0 24 24"><path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 5h-3v5.5c0 1.38-1.12 2.5-2.5 2.5S10 13.88 10 12.5s1.12-2.5 2.5-2.5c.57 0 1.08.19 1.5.5V5h4v2zM4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6z"/></svg>
      Library
    </button>
  </nav>

  <!-- ════════════════════════════════════════════════════
       PLAYLIST MODAL (full-screen overlay)
  ════════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="modal-playlist" style="display:none">

    <div class="modal-hero">
      <div class="modal-hero-bg" id="playlist-hero-bg">🟢</div>
      <div class="modal-hero-grad"></div>
      <button class="modal-back" id="btn-back-playlist" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="white"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <div class="modal-label"></div>
      <div class="modal-title"></div>
      <div class="modal-desc"></div>
    </div>

    <div class="modal-actions">
      <button class="btn-play-large" id="playlist-play-btn" aria-label="Play">
        <svg viewBox="0 0 24 24" fill="black"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <div class="btn-shuffle">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
        Shuffle
      </div>
    </div>

    <div class="modal-track-list"></div>

  </div>

  <!-- ════════════════════════════════════════════════════
       LESSON MODAL (full-screen overlay)
  ════════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="modal-lesson" style="display:none">

    <div class="modal-hero" style="min-height:220px">
      <div class="modal-hero-bg"></div>
      <div class="modal-hero-grad"></div>
      <button class="modal-back" id="btn-back-lesson" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="white"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <div class="modal-label">Lesson</div>
      <div class="modal-title"></div>
      <div class="modal-desc"></div>
    </div>

    <div class="lesson-viewer"></div>

  </div>

  <script src="spotify.js"></script>
</body>
</html>
