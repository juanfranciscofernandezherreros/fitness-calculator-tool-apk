<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Iniciar sesión - Grammar &amp; Vocabulary</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ---- Login-page overrides ---- */
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* ---- Card ---- */
    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--panel);
      border-radius: 18px;
      padding: 2.4rem 2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
      animation: fadeUp 0.35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---- App logo / icon ---- */
    .login-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 1.8rem;
    }

    .login-logo .icon-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0e3460 0%, #1a5276 100%);
      border: 2px solid var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin-bottom: 0.8rem;
      box-shadow: 0 0 18px rgba(100,255,218,0.25);
    }

    .login-logo h2 {
      margin: 0;
      font-size: 1.3rem;
      color: var(--text);
      border: none;
      padding: 0;
      text-align: center;
    }

    .login-logo p {
      margin: 0.3rem 0 0;
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
    }

    /* ---- Form groups ---- */
    .form-group {
      margin-bottom: 1.1rem;
    }

    .form-group label {
      display: block;
      color: var(--muted);
      margin-bottom: 0.35rem;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper .field-icon {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
      color: var(--muted);
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem 2.8rem 0.75rem 2.4rem;
      background: var(--panel-2);
      border: 1.5px solid rgba(100,255,218,0.15);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.97rem;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
      box-sizing: border-box;
    }

    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(100,255,218,0.12);
    }

    /* Show/hide password toggle */
    .toggle-pw {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1.05rem;
      padding: 0;
      line-height: 1;
      transition: color 0.2s;
    }

    .toggle-pw:hover {
      color: var(--primary);
    }

    /* ---- Message banner ---- */
    #msg {
      margin-bottom: 1rem;
      padding: 0.7rem 1rem;
      border-radius: 8px;
      font-size: 0.88rem;
      display: none;
      line-height: 1.4;
    }

    #msg.error {
      background: rgba(255,80,80,0.12);
      border: 1px solid rgba(255,80,80,0.35);
      color: #ff9090;
      display: flex;
      gap: 0.5rem;
      align-items: flex-start;
    }

    #msg.success {
      background: rgba(100,255,218,0.08);
      border: 1px solid rgba(100,255,218,0.3);
      color: var(--primary);
      display: flex;
      gap: 0.5rem;
      align-items: flex-start;
    }

    /* ---- Submit button ---- */
    .btn-login {
      width: 100%;
      padding: 0.85rem;
      font-size: 1rem;
      border-radius: 10px;
      margin-top: 0.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      letter-spacing: 0.02em;
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Spinner */
    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(10,25,47,0.4);
      border-top-color: #0a192f;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .btn-login.loading .spinner { display: inline-block; }
    .btn-login.loading .btn-label { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Divider ---- */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin: 1.3rem 0;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(100,255,218,0.12);
    }

    /* ---- Register link ---- */
    .auth-link {
      text-align: center;
      margin-top: 1rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .auth-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <h1>🎯 Ruta de Aprendizaje</h1>
    <p>Avanza paso a paso por Gramática y Vocabulario</p>
  </header>

  <main>
    <div class="login-card">

      <!-- App icon + title -->
      <div class="login-logo">
        <div class="icon-circle">🎓</div>
        <h2>Bienvenido de nuevo</h2>
        <p>Inicia sesión para continuar aprendiendo</p>
      </div>

      <!-- Feedback message -->
      <div id="msg"></div>

      <!-- Login form -->
      <form id="login-form" novalidate>

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <div class="input-wrapper">
            <span class="field-icon">✉️</span>
            <input type="email" id="email" placeholder="tu@email.com"
                   autocomplete="email" required />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <span class="field-icon">🔒</span>
            <input type="password" id="password" placeholder="••••••••"
                   autocomplete="current-password" required />
            <button type="button" class="toggle-pw" id="toggle-pw"
                    aria-label="Mostrar / ocultar contraseña">👁️</button>
          </div>
        </div>

        <button type="submit" class="btn btn-login" id="submit-btn">
          <span class="spinner"></span>
          <span class="btn-label">Entrar</span>
        </button>
      </form>

      <div class="divider">o</div>

      <p class="auth-link">¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
    </div>
  </main>

  <footer>
    <p>© 2025 Ruta educativa - Inglés Grammar &amp; Vocabulary</p>
  </footer>

  <script src="auth.js"></script>
  <script>
    // Redirect if already logged in
    if (isAuthenticated()) {
      window.location.href = 'index.html';
    }

    const form      = document.getElementById('login-form');
    const msgEl     = document.getElementById('msg');
    const submitBtn = document.getElementById('submit-btn');
    const togglePw  = document.getElementById('toggle-pw');
    const pwInput   = document.getElementById('password');

    // Show / hide password
    togglePw.addEventListener('click', () => {
      const show = pwInput.type === 'password';
      pwInput.type = show ? 'text' : 'password';
      togglePw.textContent = show ? '🙈' : '👁️';
    });

    function showMsg(text, type, icon) {
      msgEl.innerHTML = `<span>${icon}</span><span>${text}</span>`;
      msgEl.className = type;
    }

    function setLoading(loading) {
      submitBtn.disabled = loading;
      submitBtn.classList.toggle('loading', loading);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msgEl.className = '';
      msgEl.textContent = '';

      const email    = document.getElementById('email').value.trim();
      const password = pwInput.value;

      setLoading(true);
      try {
        const res = await fetch(`${API_BASE_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        if (res.ok) {
          const data = await res.json();
          if (!data.access_token || !data.refresh_token) {
            showMsg('Respuesta inesperada del servidor. Inténtalo de nuevo.', 'error', '⚠️');
            return;
          }
          saveTokens(data.access_token, data.refresh_token);
          window.location.href = 'index.html';
        } else {
          const err = await res.json().catch(() => ({}));
          showMsg(err.message || 'Email o contraseña incorrectos.', 'error', '❌');
        }
      } catch {
        showMsg('No se pudo conectar con el servidor. Comprueba la conexión.', 'error', '📡');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
