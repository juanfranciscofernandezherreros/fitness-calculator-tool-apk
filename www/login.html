<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>🔐 Login - Grammar & Vocabulary</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-container {
      max-width: 420px;
      margin: 3rem auto;
      background: var(--panel);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .auth-container h2 {
      margin-top: 0;
      border-bottom: 2px solid var(--primary);
      padding-bottom: 0.5rem;
    }
    .form-group {
      margin-bottom: 1.2rem;
    }
    .form-group label {
      display: block;
      color: var(--muted);
      margin-bottom: 0.4rem;
      font-size: 0.9rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.7rem 1rem;
      background: var(--panel-2);
      border: 1px solid rgba(100,255,218,0.2);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s;
    }
    .form-group input:focus {
      border-color: var(--primary);
    }
    .btn-full {
      width: 100%;
      padding: 0.8rem;
      font-size: 1rem;
    }
    .auth-link {
      text-align: center;
      margin-top: 1.2rem;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .auth-link a {
      color: var(--primary);
      text-decoration: none;
    }
    .auth-link a:hover {
      text-decoration: underline;
    }
    #msg {
      margin-bottom: 1rem;
      padding: 0.7rem 1rem;
      border-radius: var(--radius);
      font-size: 0.9rem;
      display: none;
    }
    #msg.error {
      background: rgba(255,80,80,0.15);
      border: 1px solid rgba(255,80,80,0.4);
      color: #ff9090;
      display: block;
    }
    #msg.success {
      background: rgba(100,255,218,0.1);
      border: 1px solid rgba(100,255,218,0.3);
      color: var(--primary);
      display: block;
    }
  </style>
</head>
<body>
  <header>
    <h1>🎯 Ruta de Aprendizaje</h1>
    <p>Avanza paso a paso por Gramática y Vocabulario</p>
  </header>

  <main>
    <div class="auth-container">
      <h2>🔐 Iniciar sesión</h2>
      <div id="msg"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="tu@email.com" required />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-full">Entrar</button>
      </form>
      <p class="auth-link">¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
    </div>
  </main>

  <footer>
    <p>© 2025 Ruta educativa - Inglés Grammar &amp; Vocabulary</p>
  </footer>

  <script src="auth.js"></script>
  <script>
    // Redirect if already logged in
    if (isAuthenticated()) {
      window.location.href = 'index.html';
    }

    const form = document.getElementById('login-form');
    const msg = document.getElementById('msg');

    function showMsg(text, type) {
      msg.textContent = text;
      msg.className = type;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.className = '';
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch(`${API_BASE_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        if (res.ok) {
          const data = await res.json();
          if (!data.access_token || !data.refresh_token) {
            showMsg('Respuesta inesperada del servidor. Inténtalo de nuevo.', 'error');
            return;
          }
          saveTokens(data.access_token, data.refresh_token);
          window.location.href = 'index.html';
        } else {
          const err = await res.json().catch(() => ({}));
          showMsg(err.message || 'Email o contraseña incorrectos.', 'error');
        }
      } catch {
        showMsg('No se pudo conectar con el servidor. Comprueba la conexión.', 'error');
      }
    });
  </script>
</body>
</html>
