<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Encuesta</title>
  <style>
    :root {
      --bg: #0a192f;
      --panel: #112240;
      --accent: #64ffda;
      --text: #ccd6f6;
      --muted: #8892b0;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      margin: 0;
      padding: 0;
    }
    header {
      text-align: center;
      padding: 2rem 1rem 1rem;
      background: var(--panel);
      color: var(--accent);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    header h1 { margin: 0; font-size: 1.6rem; }
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    .card {
      background: var(--panel);
      border-radius: 10px;
      padding: 1.5rem;
      margin: 1rem auto;
      width: 100%;
      max-width: 680px;
      box-shadow: 0 0 10px rgba(100,255,218,0.1);
    }
    .card h3 {
      margin: 0 0 1rem;
      font-size: 1rem;
      color: var(--text);
    }
    .badge {
      background: var(--accent);
      color: var(--bg);
      padding: 0.15rem 0.55rem;
      border-radius: 5px;
      font-weight: bold;
      margin-right: 0.5rem;
      font-size: 0.85rem;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    label.option {
      background: #233554;
      padding: 0.65rem 1rem;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      cursor: pointer;
      transition: background 0.25s ease, transform 0.2s ease;
    }
    label.option:hover {
      background: #2f456b;
      transform: translateX(4px);
    }
    label.option input[type="radio"] {
      accent-color: var(--accent);
      width: 1.1rem;
      height: 1.1rem;
      flex-shrink: 0;
    }
    .controls {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 2rem;
    }
    button {
      background: var(--accent);
      color: var(--bg);
      font-weight: bold;
      border: none;
      border-radius: 8px;
      padding: 0.7rem 1.8rem;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.25s ease, transform 0.2s ease;
    }
    button:hover {
      background: #52e0c4;
      transform: translateY(-2px);
    }
    button.secondary {
      background: transparent;
      color: var(--accent);
      border: 2px solid var(--accent);
    }
    button.secondary:hover { background: #233554; }
    #result {
      display: none;
      margin: 1.5rem auto;
      max-width: 680px;
      padding: 1.2rem 1.5rem;
      background: rgba(100,255,218,0.08);
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      color: var(--text);
    }
    #result h2 { color: var(--accent); margin-top: 0; }
    #result ul { padding-left: 1.2rem; line-height: 1.8; }
    footer {
      background: var(--panel);
      color: var(--muted);
      text-align: center;
      padding: 1rem;
      font-size: 0.85rem;
      margin-top: 2rem;
    }
  </style>
</head>
<body>

<header>
  <h1 id="survey-title">Cargando encuesta…</h1>
</header>

<main id="app"></main>

<div id="result">
  <h2>✅ Respuestas enviadas</h2>
  <ul id="result-list"></ul>
</div>

<div class="controls">
  <button id="btn-submit">Enviar respuestas</button>
  <button class="secondary" id="btn-reset">Reiniciar</button>
</div>

<footer>
  <p>© 2025 Encuesta App</p>
</footer>

<script>
  let surveyData = null;

  fetch('survey.json')
    .then(function(res) { return res.json(); })
    .then(function(data) {
      surveyData = data;
      document.getElementById('survey-title').textContent = data.title;
      renderSurvey(data);
    })
    .catch(function(err) {
      document.getElementById('survey-title').textContent = 'Error al cargar la encuesta';
      console.error('No se pudo cargar survey.json:', err);
    });

  function renderSurvey(data) {
    var app = document.getElementById('app');
    app.innerHTML = '';
    data.questions.forEach(function(q) {
      var card = document.createElement('article');
      card.className = 'card';

      var optionsHtml = q.options.map(function(opt, i) {
        return '<label class="option">' +
          '<input type="radio" name="q' + q.id + '" value="' + i + '" />' +
          '<span>' + escapeHtml(opt) + '</span>' +
          '</label>';
      }).join('');

      card.innerHTML =
        '<h3><span class="badge">' + q.id + '</span>' + escapeHtml(q.text) + '</h3>' +
        '<div class="options">' + optionsHtml + '</div>';

      app.appendChild(card);
    });
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  document.getElementById('btn-submit').addEventListener('click', function() {
    if (!surveyData) return;

    var answers = [];
    var allAnswered = true;

    surveyData.questions.forEach(function(q) {
      var selected = document.querySelector('input[name="q' + q.id + '"]:checked');
      if (!selected) {
        allAnswered = false;
      } else {
        answers.push({
          question: q.text,
          answer: q.options[parseInt(selected.value, 10)]
        });
      }
    });

    if (!allAnswered) {
      alert('Por favor, responde todas las preguntas antes de enviar.');
      return;
    }

    var resultList = document.getElementById('result-list');
    resultList.innerHTML = '';
    answers.forEach(function(a) {
      var li = document.createElement('li');
      li.textContent = a.question + ': ' + a.answer;
      resultList.appendChild(li);
    });

    document.getElementById('result').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  document.getElementById('btn-reset').addEventListener('click', function() {
    if (!surveyData) return;
    renderSurvey(surveyData);
    document.getElementById('result').style.display = 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
</script>
</body>
</html>
